<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Check Order Status</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box{
  width:420px;
  background:#111827;
  padding:30px;
  border-radius:14px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:12px 0;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.result{
  margin-top:20px;
  background:#1f2937;
  padding:18px;
  border-radius:12px;
  display:none;
  text-align:left;
}

h2{
  margin-top:0;
}
</style>
</head>

<body>

<div class="box">

<h2>📦 Check Order Status</h2>

<input id="orderId" placeholder="Enter your Order ID">

<button onclick="checkOrder()">Check Status</button>

<div class="result" id="result"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxHFzugofomgjtLI7SlkAiTEa6BDKedcL-87rZsnQmGa33hQ9_5cc18WgrSUsPbYJ0L/exec";

async function checkOrder(){

  const id = document.getElementById("orderId").value.trim();
  const box = document.getElementById("result");

  if(!id){
    alert("Please enter Order ID");
    return;
  }

  box.style.display = "block";
  box.innerHTML = "⏳ Checking...";

  try{

    const res = await fetch(API);
    const data = await res.json();

    const order = data.find(o => String(o.orderId) === id);

    if(order){

      box.innerHTML = `
        <h3>✅ Order Found</h3>
        <p><b>Username:</b> ${order.username}</p>
        <p><b>Phone:</b> ${order.phone}</p>
        <p><b>Package:</b> ${order.package}</p>
        <p><b>Price:</b> ${order.price}</p>
        <p><b>Status:</b> ${order.status}</p>
      `;

    }else{

      box.innerHTML = `
        <h3>❌ Order Not Found</h3>
        <p>Please check your Order ID.</p>
      `;
    }

  }catch(err){

    box.innerHTML = `
      <h3>⚠ Error</h3>
      <p>${err.message}</p>
    `;
  }
}

</script>

</body>
</html>
