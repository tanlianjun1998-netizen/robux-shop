<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Robux Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

/* LOGIN */
.loginBox{
  text-align:center;
  margin-top:120px;
}

input, button, select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border-bottom:1px solid #1f2937;
  text-align:center;
}

th{
  background:#111827;
}

td{
  background:#0f172a;
}

.badge{
  padding:5px 10px;
  border-radius:6px;
  background:#f59e0b;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login" class="loginBox">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="pass" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">

<h1>🛠 Admin Dashboard</h1>

<button onclick="loadData()">🔄 Refresh</button>

<table>
<thead>
<tr>
  <th>Order ID</th>
  <th>User</th>
  <th>Package</th>
  <th>Price</th>
  <th>Status</th>
  <th>Update</th>
</tr>
</thead>

<tbody id="orders"></tbody>
</table>

</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHFzugofomgjtLI7SlkAiTEa6BDKedcL-87rZsnQmGa33hQ9_5cc18WgrSUsPbYJ0L/exec"; // 🔥 replace this

let ordersData = [];

/* LOGIN */
function login(){
  let pass = document.getElementById("pass").value;

  if(pass === "admin123"){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    loadData();
  }else{
    alert("Wrong password");
  }
}

/* LOAD ORDERS */
async function loadData(){

  try{

    let res = await fetch(SCRIPT_URL);
    ordersData = await res.json();

    let html = "";

    ordersData.reverse().forEach((o,i)=>{

      html += `
        <tr>
          <td>${o.orderId}</td>
          <td>${o.username}</td>
          <td>${o.package}</td>
          <td>${o.price}</td>
          <td>${o.status}</td>
          <td>
            <select id="status_${i}">
            <option ${o.status==="Pending"?"selected":""}>Pending</option>
            <option ${o.status==="Paid"?"selected":""}>Paid</option>
            <option ${o.status==="Delivered"?"selected":""}>Delivered</option>
            </select>
            <button onclick="updateStatus(${i})">Save</button>
          </td>
        </tr>
      `;
    });

    document.getElementById("orders").innerHTML = html;

  }catch(err){
    alert("Failed to load data: " + err.message);
    console.error(err);
  }
}

/* UPDATE STATUS */
async function updateStatus(i){

  let status = document.getElementById("status_"+i).value;

  let order = ordersData.slice().reverse()[i];

  let formData = new URLSearchParams();

  formData.append("action", "update");
  formData.append("orderId", order.orderId);
  formData.append("status", status);

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
  });

  alert("Updated!");
  loadData();
}
</script>

</body>
</html>
