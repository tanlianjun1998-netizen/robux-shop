<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Robux Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{text-align:center;}

.loginBox{
  text-align:center;
  margin-top:120px;
}

input,button,select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #1f2937;
  text-align:center;
}

th{background:#111827;}
td{background:#0f172a;}

.badge{
  padding:5px 10px;
  border-radius:6px;
  background:#f59e0b;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login" class="loginBox">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="pass" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">

<h1>🛠 Admin Dashboard</h1>

<button onclick="loadData()">🔄 Refresh</button>

<table>
<thead>
<tr>
  <th>Order ID</th>
  <th>User</th>
  <th>Phone</th>
  <th>Package</th>
  <th>Price</th>
  <th>Status</th>
  <th>Action</th>
</tr>
</thead>

<tbody id="orders"></tbody>
</table>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxHFzugofomgjtLI7SlkAiTEa6BDKedcL-87rZsnQmGa33hQ9_5cc18WgrSUsPbYJ0L/exec";

let orders = [];

/* LOGIN */
function login(){
  let pass = document.getElementById("pass").value;

  if(pass === "admin13841384"){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    loadData();
  }else{
    alert("Wrong password");
  }
}

/* LOAD */
async function loadData(){

  try{
    let res = await fetch(API);
    orders = await res.json();

    let html = "";

    // ❗ NO reverse index bug anymore
    orders.forEach(o=>{

      html += `
        <tr>
          <td>${o.orderId}</td>
          <td>${o.username}</td>
          <td>${o.phone || ""}</td>
          <td>${o.package}</td>
          <td>${o.price}</td>
          <td>
            <select id="status_${o.orderId}">
              <option value="Pending" ${o.status==="Pending"?"selected":""}>Pending</option>
              <option value="Paid" ${o.status==="Paid"?"selected":""}>Paid</option>
              <option value="Delivered" ${o.status==="Delivered"?"selected":""}>Delivered</option>
            </select>
          </td>
          <td>
            <button onclick="updateStatus(${o.orderId})">Save</button>
            <button style="background:red" onclick="deleteOrder(${o.orderId})">Delete</button>
          </td>
        </tr>
      `;
    });

    document.getElementById("orders").innerHTML = html;

  }catch(err){
    alert("Load failed: " + err.message);
  }
}

/* UPDATE */
async function updateStatus(orderId){

  let status = document.getElementById("status_"+orderId).value;

  let form = new URLSearchParams();
  form.append("action","update");
  form.append("orderId",orderId);
  form.append("status",status);

  try{

    let res = await fetch(API,{
      method:"POST",
      body:form
    });

    alert(await res.text());
    loadData();

  }catch(err){
    alert("Update failed: " + err.message);
  }
}

/* DELETE */
async function deleteOrder(orderId){

  if(!confirm("Delete order " + orderId + "?")) return;

  let form = new URLSearchParams();
  form.append("action","delete");
  form.append("orderId",orderId);

  try{

    let res = await fetch(API,{
      method:"POST",
      body:form
    });

    alert(await res.text());
    loadData();

  }catch(err){
    alert("Delete failed: " + err.message);
  }
}

</script>

</body>
</html>
