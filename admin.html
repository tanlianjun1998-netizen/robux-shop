<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Robux Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

.loginBox{
  text-align:center;
  margin-top:120px;
}

input, button, select{
  padding:8px;
  margin:4px;
  border-radius:6px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border-bottom:1px solid #1f2937;
  text-align:center;
}

th{
  background:#111827;
}

td{
  background:#0f172a;
}

.editInput{
  width:100px;
  background:#1f2937;
  color:white;
}

.badge{
  padding:5px 10px;
  border-radius:6px;
  background:#f59e0b;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login" class="loginBox">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="pass" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">

<h1>🛠 Admin Dashboard</h1>

<button onclick="loadData()">🔄 Refresh</button>

<table>
<thead>
<tr>
  <th>ID</th>
  <th>User</th>
  <th>Package</th>
  <th>Price</th>
  <th>Status</th>
  <th>Action</th>
</tr>
</thead>

<tbody id="orders"></tbody>
</table>

</div>

</div>

<script>

const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE";

let ordersData = [];

/* LOGIN */
function login(){
  let pass = document.getElementById("pass").value;

  if(pass === "admin123"){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    loadData();
  } else {
    alert("Wrong password");
  }
}

/* LOAD DATA */
async function loadData(){

  try{

    let res = await fetch(SCRIPT_URL);
    ordersData = await res.json();

    let html = "";

    ordersData.reverse().forEach((o,i)=>{

      html += `
        <tr>
          <td>${o.orderId}</td>
          <td>${o.username}</td>

          <td>
            <input class="editInput" id="pkg_${i}" value="${o.package}">
          </td>

          <td>
            <input class="editInput" id="price_${i}" value="${o.price}">
          </td>

          <td>
            <select id="status_${i}">
              <option ${o.status==="Pending"?"selected":""}>Pending</option>
              <option ${o.status==="Paid"?"selected":""}>Paid</option>
              <option ${o.status==="Delivered"?"selected":""}>Delivered</option>
            </select>
          </td>

          <td>
            <button onclick="updateOrder(${i})">Save</button>
            <button onclick="deleteOrder(${i})" style="background:red">Delete</button>
          </td>
        </tr>
      `;
    });

    document.getElementById("orders").innerHTML = html;

  }catch(err){
    alert("Load failed: " + err.message);
  }
}

/* UPDATE ORDER */
async function updateOrder(i){

  let order = ordersData.slice().reverse()[i];

  let status = document.getElementById("status_"+i).value;
  let pkg = document.getElementById("pkg_"+i).value;
  let price = document.getElementById("price_"+i).value;

  let form = new URLSearchParams();
  form.append("action","update");
  form.append("orderId",order.orderId);
  form.append("status",status);
  form.append("package",pkg);
  form.append("price",price);

  await fetch(SCRIPT_URL,{
    method:"POST",
    body:form
  });

  alert("Updated!");
  loadData();
}

/* DELETE ORDER */
async function deleteOrder(i){

  let order = ordersData.slice().reverse()[i];

  if(!confirm("Delete this order?")) return;

  let form = new URLSearchParams();
  form.append("action","delete");
  form.append("orderId",order.orderId);

  await fetch(SCRIPT_URL,{
    method:"POST",
    body:form
  });

  alert("Deleted!");
  loadData();
}

</script>

</body>
</html>
