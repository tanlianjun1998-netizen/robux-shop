<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Robux Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

header{
  text-align:center;
  padding:20px;
}

h1{font-size:34px;}
.sub{color:#94a3b8;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.box{
  background:#111827;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  border:2px solid transparent;
  transition:0.2s;
}

.box:hover{transform:scale(1.03);}
.selected{border:2px solid #22c55e;}

.price{
  color:#22c55e;
  font-weight:bold;
  margin-top:5px;
}

section{
  margin-top:20px;
  background:#111827;
  padding:15px;
  border-radius:12px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* QR AT BOTTOM */
.qr{
  margin-top:30px;
  text-align:center;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

.qr img{
  width:260px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>🛒 Robux Store</h1>
  <div class="sub">Fast Delivery · Secure Payment</div>
</header>

<!-- PACKAGES -->
<div class="grid">

<div class="box" onclick="select(this,'200','5.40')">
200 Robux <div class="price">RM5.40</div>
</div>

<div class="box" onclick="select(this,'400','10.80')">
400 Robux <div class="price">RM10.80</div>
</div>

<div class="box" onclick="select(this,'800','21.60')">
800 Robux <div class="price">RM21.60</div>
</div>

<div class="box" onclick="select(this,'1000','26.00')">
1000 Robux <div class="price">RM26.00</div>
</div>

</div>

<!-- CUSTOM -->
<section>
<h3>🎯 Custom Robux</h3>

<input type="number" id="customAmount" placeholder="Enter Robux (1000+)" oninput="calcPrice()">
<input id="customPrice" placeholder="Auto Price (RM)" readonly>

<button onclick="useCustom()">Use Custom</button>
</section>

<!-- ORDER -->
<section>
<h3>📦 Place Order</h3>

<input id="username" placeholder="Roblox Username">
<input id="phone" placeholder="Phone Number (WhatsApp)">
<input id="package" placeholder="Selected Package" readonly>
<input id="price" placeholder="Price (RM)" readonly>

<button onclick="submitOrder()">Submit Order</button>
</section>

<!-- QR (BOTTOM) -->
<div class="qr">
<h3>💳 Scan to Pay</h3>
<img src="https://i.imgur.com/KOxpOPD.png">
</div>

</div>

<script>

let selectedPackage = "";
let selectedPrice = "";

/* SELECT PACKAGE */
function select(el,pkg,price){

  selectedPackage = pkg;
  selectedPrice = price;

  document.getElementById("package").value = pkg + " Robux";
  document.getElementById("price").value = "RM " + price;

  document.querySelectorAll(".box").forEach(b=>b.classList.remove("selected"));
  el.classList.add("selected");
}

/* CUSTOM PRICE */
function calcPrice(){

  let amt = document.getElementById("customAmount").value;

  if(!amt){
    document.getElementById("customPrice").value = "";
    return;
  }

  let price;

  if(amt >= 1000){
    price = (amt / 100) * 2.6;
  }else{
    price = (amt / 100) * 2.7;
  }

  document.getElementById("customPrice").value = "RM " + price.toFixed(2);
}

/* USE CUSTOM */
function useCustom(){

  let amt = document.getElementById("customAmount").value;
  let price = document.getElementById("customPrice").value;

  if(!amt){
    alert("Enter Robux amount");
    return;
  }

  selectedPackage = amt + " Robux (Custom)";
  selectedPrice = price;

  document.getElementById("package").value = selectedPackage;
  document.getElementById("price").value = selectedPrice;

  alert("Custom selected!");
}

/* SUBMIT */
async function submitOrder(){

  let username = document.getElementById("username").value;
  let phone = document.getElementById("phone").value;

  if(!username || !phone || !selectedPackage){
    alert("Please fill all fields");
    return;
  }

  const API = "https://script.google.com/macros/s/AKfycbxHFzugofomgjtLI7SlkAiTEa6BDKedcL-87rZsnQmGa33hQ9_5cc18WgrSUsPbYJ0L/exec";

  let form = new URLSearchParams();
  form.append("username", username);
  form.append("phone", phone);
  form.append("package", selectedPackage);
  form.append("price", selectedPrice);

  try{

    let res = await fetch(API,{
      method:"POST",
      body:form
    });

    let text = await res.text();

    alert("SUCCESS: " + text);

  }catch(err){
    alert("Error: " + err.message);
  }
}

</script>

</body>
</html>
